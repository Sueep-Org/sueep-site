# Local ERP database only. Run: docker compose up -d
# Set DATABASE_URL + DIRECT_URL in .env.local to postgresql://postgres:postgres@localhost:5432/sueep_erp
# Then create tables: npx prisma migrate deploy
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sueep_erp
    ports:
      - "5432:5432"
    volumes:
      - sueep_erp_pgdata:/var/lib/postgresql/data

volumes:
  sueep_erp_pgdata:
