<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Drawing Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      try {
        if (window.pdfjsLib) {
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
      } catch(e) { console.error(e); }
    </script>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        .hidden { display: none !important; }

        #pdfContainer {
            position: relative;
            overflow: auto;
            background: #f8f9fa;
            border-radius: 0 0 8px 8px;
            width: 100%;
            height: 600px;
            min-height: 600px;
        }

        #pdfWrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #pdfCanvas {
            display: block;
            position: absolute;
            margin: 0;
            max-width: none;
            height: auto;
        }

        #toolbar { position: relative; z-index: 5; }
        .mini-btn { padding: 4px 8px; font-size: 12px; border-radius: 6px; }
        #measureToggle.active { background: #bfdbfe; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

<button class="icon-btn sidebar-toggle" data-open-sidebar>☰</button>

<div id="appCanvas">
<div id="appError" style="display:none;color:#b00;font-size:12px;"></div>

<header style="display:flex;justify-content:flex-end;padding:.5rem 1rem;">
  <div id="auth-slot">
    <a id="login-link" href="/.auth/login/google">Sign in with Google</a>
    <a id="logout-link" href="/.auth/logout" style="display:none">Sign out</a>
  </div>
</header>

<div class="container mx-auto px-4 py-8 max-w-7xl">
<h1 class="text-4xl font-bold text-center mb-8 text-gray-800">
AI Drawing Analyzer
</h1>

<!-- UPLOAD -->
<div class="bg-white rounded-lg shadow-md p-6 mb-6">
<h2 class="text-xl font-semibold mb-4">Upload Your Drawing</h2>

<div id="dropZone"
class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-400">

<input type="file" id="fileInput"
accept=".pdf,.jpg,.jpeg,.png"
class="sr-only">

<p>Drag and drop OR click below</p>

<button id="selectFileBtn"
class="mt-4 px-4 py-2 bg-blue-600 text-white rounded">
Select file
</button>

</div>
</div>

<!-- MAIN -->
<div id="mainContent" class="hidden">

<div class="bg-white rounded-lg shadow-md p-6 mb-6">
<h2 class="text-xl font-semibold mb-2">PDF Preview</h2>

<div id="pdfContainer">
<div id="pdfWrapper">
<canvas id="pdfCanvas"></canvas>
</div>
</div>

</div>
</div>

</div>
</div>

<!-- ✅ ONLY SCRIPT YOU NEED -->
<script type="module" src="./simple-app.js"></script>

</body>
</html>
